name: Auto News Fetcher

on:
  schedule:
    # Günde 4 kez (6 saatte bir) çalışır (Örn: 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Manuel tetikleme için
    inputs:
      SINGLE_HEADLINE:
        description: 'İşlenecek tekil haber başlığı'
        required: false
        type: string
      SINGLE_SUMMARY:
        description: 'İşlenecek tekil haber özeti'
        required: false
        type: string

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai

    - name: Run News Fetcher Script
      env:
        FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SINGLE_HEADLINE: ${{ github.event.inputs.SINGLE_HEADLINE }}
        SINGLE_SUMMARY: ${{ github.event.inputs.SINGLE_SUMMARY }}
      run: python fetch_news.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # Değişiklikleri güvenli bir şekilde ekle
        git add public/ news_logs.json || true
        # Sadece değişiklik varsa commit at
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update news, logs and archives" && git push)
